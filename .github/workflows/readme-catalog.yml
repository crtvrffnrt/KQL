name: README catalog

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-readme-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate generated README catalog
        run: python3 scripts/generate-readme-catalog.py --check
